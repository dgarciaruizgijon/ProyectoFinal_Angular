<div class="container mt-4">
    <h2>Mis Críticas Guardadas</h2>
    <hr>

    <div *ngIf="criticas.length === 0" class="alert alert-info">
        Aún no has escrito ninguna crítica. ¡Ve al buscador para añadir una!
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let critica of criticas">
            <div class="card h-100 shadow-sm border-primary">
                
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <h5 class="mb-0">{{ critica.titulo }}</h5>
                    <span class="badge bg-warning text-dark fs-6">⭐ {{ critica.puntuacion }}/10</span>
                </div>

                <div class="card-body d-flex flex-column">
                    
                    <ng-container *ngIf="criticaEditando?.id !== critica.id">
                        <p class="card-text">"{{ critica.comentario }}"</p>
                        
                        <div class="mt-auto d-flex justify-content-end gap-2">
                            <button class="btn btn-sm btn-outline-primary" (click)="iniciarEdicion(critica)">
                                ✏️ Editar
                            </button>
                            
                            <button class="btn btn-sm btn-outline-danger" (click)="eliminarCritica(critica.id)">
                                🗑️ Borrar
                            </button>
                        </div>
                    </ng-container>

                    <ng-container *ngIf="criticaEditando?.id === critica.id">
                        <div class="mb-2">
                            <label class="form-label text-muted small">Cambiar Nota (1-10):</label>
                            <input type="number" class="form-control form-control-sm" min="1" max="10" [(ngModel)]="criticaEditando.puntuacion">
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-muted small">Cambiar Comentario:</label>
                            <textarea class="form-control form-control-sm" rows="3" [(ngModel)]="criticaEditando.comentario"></textarea>
                        </div>
                        
                        <div class="mt-auto d-flex justify-content-end gap-2 mt-2">
                            <button class="btn btn-sm btn-success" (click)="guardarEdicion()">
                                💾 Guardar
                            </button>
                            <button class="btn btn-sm btn-secondary" (click)="cancelarEdicion()">
                                ❌ Cancelar
                            </button>
                        </div>
                    </ng-container>

                </div>
            </div>
        </div>
    </div>
</div>
